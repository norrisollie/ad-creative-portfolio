<!DOCTYPE html>
<html lang="en">
  <!-- prettier-ignore -->
  <style>body,html{margin:0;padding:0}#panel-top-container{position:absolute;top:0;left:0;width:100%;height:220px;z-index:2}#panel-top-iframe{width:100%;height:100%;position:absolute;top:0;left: 0;border:none}#panel-top-content{display:block;position:absolute;right:0;left: 0; height: 100%; width: 100%;overflow:hidden}.clickout{position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer;z-index:9999}</style>

  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css?v=t" />
  </head>

  <body id="body_top">
    <div id="panel-top-content">
      <!-- top panel content here -->

      <div id="phone-container">
        <img
          src="assets/phone.png"
          alt=""
          srcset="assets/phone.png 1x, assets/phone@2x.png 2x"
        />

        <div id="phone-scroll-container">
          <div id="phone-scroll">
            <div id="star"></div>
          </div>
        </div>
      </div>

      <!-- <div id="sheen-container">
        <div id="scroll"></div>
        <div id="sheen"></div>
      </div> -->

      <div class="box">
        <div class="copy main copy1">
          Search and compare every new<br />Mercedes-Benz in stock today.
        </div>
        <div class="copy main copy2">
          To find the one<br />that’s right for you.
        </div>
        <div class="copy main copy3">
          All in a few clicks.<br />
          <div class="copy small copy4">
            View stock. Check finance. See offers.
          </div>
        </div>
        <div class="cta top">Start your search</div>
        <div class="copy legal">UK spec may vary. Subject to availability.</div>
        <img
          src="assets/logo.png"
          srcset="assets/logo.png 1x, assets/logo@2x.png 2x"
          class="logo top"
        />
      </div>
    </div>
  </body>
</html>
