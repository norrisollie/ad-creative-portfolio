<!DOCTYPE html>
<html lang="en">
  <head>
    <meta data-template-name="Template_H5T_inpage-120x600-image" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <link rel="stylesheet" type="text/css" href="style.css" />

    <script
      type="text/javascript"
      src="https://s0.2mdn.net/ads/studio/Enabler.js"
    ></script>
  </head>
  <body>
    <div id="ad-container">
      <img
        id="sainsburys"
        src="assets/sainsburys.png"
        srcset="assets/sainsburys.png 1x, assets/sainsburys@2x.png 2x"
      />
      <div id="nectarprices-container">
        <img
          id="nectarprices"
          src="assets/nectarprices.png"
          srcset="assets/nectarprices.png 1x, assets/nectarprices@2x.png 2x"
        />
      </div>

      <img
        id="drinkaware"
        src="assets/drinkaware.png"
        srcset="assets/drinkaware.png 1x, assets/drinkaware@2x.png 2x"
      />
      <div id="offer-container">
        <img
          id="offer"
          src="assets/offer.png"
          srcset="assets/offer.png 1x, assets/offer@2x.png 2x"
        />
        <div class="nectar-copy" id="nectar-price-copy">Nectar price</div>
        <div class="nectar-copy" id="nectar-price-cost">£88.88</div>
        <div class="nectar-copy" id="normal-price-copy">Normal<br />price</div>
        <div class="nectar-copy" id="normal-price-cost">£88.88</div>
      </div>
      <div id="copy-container">
        <div class="copy-overflow">
          <div class="copy">Get Nectar</div>
        </div>
        <div class="copy-overflow">
          <div class="copy">Prices on 100s</div>
        </div>
        <div class="copy-overflow">
          <div class="copy">of products</div>
        </div>
        <div class="copy-overflow">
          <div class="copy">when you</div>
        </div>
        <div class="copy-overflow">
          <div class="copy">scan your</div>
        </div>
        <div class="copy-overflow">
          <div class="copy">Nectar card</div>
        </div>
      </div>
    </div>
    <script src="textshrink.js"></script>
    <script src="logic.js"></script>
  </body>
</html>
